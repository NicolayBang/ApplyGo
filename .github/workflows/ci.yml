name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: applypilot
          POSTGRES_USER: applypilot
          POSTGRES_PASSWORD: applypilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U applypilot -d applypilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint backend
        run: python -m ruff check .

      - name: Run backend tests
        run: python -m pytest

      - name: Validate database migrations
        run: python -m alembic upgrade head

      - name: Smoke import FastAPI app
        run: python -c "from applypilot.main import app; assert app.title == 'ApplyPilot'"
