services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles:
      - app
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-applypilot}:${POSTGRES_PASSWORD:-applypilot}@postgres:5432/${POSTGRES_DB:-applypilot}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["python", "-m", "uvicorn", "applypilot.main:app", "--host", "0.0.0.0", "--port", "8000"]

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-applypilot}:${POSTGRES_PASSWORD:-applypilot}@postgres:5432/${POSTGRES_DB:-applypilot}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "alembic", "upgrade", "head"]

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    profiles:
      - demo
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-applypilot}:${POSTGRES_PASSWORD:-applypilot}@postgres:5432/${POSTGRES_DB:-applypilot}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "scripts.validate_seed_to_dashboard"]

  postgres:
    image: postgres:16
    container_name: applypilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-applypilot}
      POSTGRES_USER: ${POSTGRES_USER:-applypilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applypilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-applypilot} -d $${POSTGRES_DB:-applypilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    container_name: applypilot-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
