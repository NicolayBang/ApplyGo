<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ApplyPilot Audit Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="Audit dashboard controls">
        <div>
          <p class="eyebrow">ApplyPilot</p>
          <h1>Application audit dashboard</h1>
        </div>
        <form class="controls" id="audit-form">
          <label>
            <span>API base</span>
            <input id="api-base" type="url" value="http://localhost:8000" />
          </label>
          <label>
            <span>Application ID</span>
            <input id="application-id" type="text" placeholder="UUID from demo_seed output" />
          </label>
          <button type="submit">Load audit</button>
          <button type="button" id="demo-button">Demo data</button>
        </form>
      </section>

      <section class="status-row" aria-live="polite">
        <div class="status-pill" id="status-pill">Demo mode</div>
        <p id="status-message">Using local demo data until a backend application ID is provided.</p>
      </section>

      <section class="panel intake-panel" aria-label="Manual job intake">
        <div class="section-heading">
          <h2>Manual intake</h2>
          <span>Create application</span>
        </div>
        <form class="intake-form" id="intake-form">
          <label>
            <span>Role title</span>
            <input id="job-title" type="text" placeholder="Platform Engineer" required />
          </label>
          <label>
            <span>Company</span>
            <input id="job-company" type="text" placeholder="ApplyPilot Demo Co." required />
          </label>
          <label>
            <span>Location</span>
            <input id="job-location" type="text" placeholder="Remote" />
          </label>
          <label>
            <span>Job URL</span>
            <input id="job-url" type="url" placeholder="https://example.com/job" />
          </label>
          <label class="checkbox-label">
            <input id="remote-ok" type="checkbox" checked />
            <span>Remote ok</span>
          </label>
          <button type="submit">Create</button>
          <label class="job-description-field">
            <span>Job description</span>
            <textarea
              id="job-description"
              placeholder="Paste the job post or key requirements"
              rows="6"
            ></textarea>
          </label>
        </form>
      </section>

      <section class="panel workflow-panel" aria-label="Workflow actions">
        <div class="section-heading">
          <h2>Workflow actions</h2>
          <span>State, score, policy, and dry-run</span>
        </div>
        <div class="state-actions" id="state-actions"></div>
        <div class="workflow-actions">
          <button type="button" id="score-button">Score application</button>
          <button type="button" id="policy-button">Evaluate policy</button>
          <button type="button" id="dry-run-button">Dry-run follow-up</button>
        </div>
      </section>

      <section class="summary-grid" aria-label="Application summary">
        <article class="panel summary-panel">
          <h2>Application</h2>
          <dl class="summary-list" id="application-summary"></dl>
        </article>
        <article class="panel">
          <h2>Score details</h2>
          <div class="compact-list" id="score-list"></div>
        </article>
        <article class="panel">
          <h2>Policy decisions</h2>
          <div class="compact-list" id="policy-list"></div>
        </article>
        <article class="panel">
          <h2>Executor actions</h2>
          <div class="compact-list" id="executor-list"></div>
        </article>
      </section>

      <section class="panel timeline-panel" aria-label="Audit timeline">
        <div class="section-heading">
          <h2>Audit timeline</h2>
          <span id="event-count">0 events</span>
        </div>
        <ol class="timeline" id="timeline"></ol>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
